<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Board — Soundboard</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">🔊</div>
    <span>Board</span>
    <small id="cloudBadge" class="cloud-badge">· local</small>
  </div>
  <div class="top-actions">
    <button type="button" class="btn ghost" id="stopAllBtn" title="Stop all playing sounds (Space)">
      <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
      Stop
    </button>
    <button type="button" class="toggle on" id="kbdToggle" title="Keyboard shortcuts">
      <span class="switch"></span>
      <span>Shortcuts</span>
    </button>
    <button type="button" class="btn ghost" id="syncBtn" title="Reload shared board from Supabase / site">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Sync
    </button>
    <button type="button" class="btn ghost" id="importBtn" title="Import board">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import
    </button>
    <button type="button" class="btn ghost" id="exportBtn" title="Export board.json backup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button type="button" class="btn primary" id="newSoundBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New sound
    </button>
  </div>
</header>

<main class="page">
  <div class="page-head">
    <div>
      <h1>My Board</h1>
      <p><span id="boardCount" class="board-count">12 slots</span> · Click a pad to play (again = restart). <strong>Space</strong> or Stop cuts all sound.</p>
    </div>
    <div class="legend">
      <span class="lg-empty"><i></i>Empty</span>
      <span class="lg-filled"><i></i>Filled</span>
      <span class="lg-playing"><i></i>Playing</span>
    </div>
  </div>

  <div class="board" id="board" aria-label="Soundboard pads"></div>
</main>

<!-- Add / edit sound modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <h3 id="modalTitle">Add a sound</h3>
      <button type="button" class="close" id="modalClose" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="tabs">
      <button type="button" class="tab active" data-tab="record">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        Record
      </button>
      <button type="button" class="tab" data-tab="upload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload
      </button>
    </div>

    <!-- RECORD -->
    <div class="tab-panel active" data-panel="record">
      <div class="record-stage">
        <button type="button" class="rec-btn" id="recBtn" aria-label="Start or stop recording">
          <div class="inner"></div>
        </button>
        <div class="level-meter" id="levelMeter"></div>
        <div class="timer"><span class="rec-dot" id="recDot"></span><span id="recTime">00:00</span></div>
      </div>

      <div class="preview-real" id="recPreviewWrap">
        <audio id="recPreview" class="preview" controls></audio>
      </div>

      <div class="field-row">
        <div class="field" style="flex:1">
          <label for="recName">Name</label>
          <input type="text" id="recName" placeholder="e.g. Airhorn" maxlength="48" />
        </div>
        <div class="field">
          <label>Shortcut</label>
          <button type="button" class="kbd-input" id="recShortcut" title="Click then press a key">—</button>
        </div>
      </div>
    </div>

    <!-- UPLOAD -->
    <div class="tab-panel" data-panel="upload">
      <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload audio file">
        <div class="up-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <h4>Drop an MP3 or WAV here</h4>
        <p>or <span class="browse">click to browse</span> · max ~10s clips work best</p>
      </div>

      <div class="file-card" id="fileCard">
        <div class="fi" id="fileExt">WAV</div>
        <div>
          <div class="fname" id="fileName">—</div>
          <div class="fmeta" id="fileMeta">—</div>
        </div>
        <button type="button" class="fx" id="fileClear" aria-label="Remove file">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="field-row">
        <div class="field" style="flex:1">
          <label for="upName">Name</label>
          <input type="text" id="upName" placeholder="e.g. Airhorn" maxlength="48" />
        </div>
        <div class="field">
          <label>Shortcut</label>
          <button type="button" class="kbd-input" id="upShortcut" title="Click then press a key">—</button>
        </div>
      </div>
    </div>

    <div class="modal-foot">
      <button type="button" class="btn ghost" id="modalCancel">Cancel</button>
      <button type="button" class="btn primary" id="modalSave" disabled>Save to board</button>
    </div>
  </div>
</div>

<input type="file" id="importInput" accept="application/json,.json" class="sr-only" />
<input type="file" id="uploadInput" accept="audio/*,.mp3,.wav,.ogg,.m4a,.webm" class="sr-only" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=3"></script>
<script src="supabase-sync.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
